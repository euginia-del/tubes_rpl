apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi # Menyiapkan harddisk virtual 1GB
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
spec:
  replicas: 1 # Database cukup 1 pod saja sesuai instruksi dosen
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        # INI PENTING: Settingan awal MySQL kamu
        - name: MYSQL_ROOT_PASSWORD
          value: "password123" # Password root kamu nanti
        - name: MYSQL_DATABASE
          value: "laundry_db"    # Kubernetes otomatis bikin DB ini pas nyala
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql # Tempat MySQL simpan data di dalam Linux
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service # Nama ini yang bakal dipanggil di kodingan PHP kamu
spec:
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306